perfil: |
  Niña prodigio venezolana con experiencia internacional en teclados.
  He tocado para Abraham Lincoln en la Casa Blanca (y no le rompí el piano).
  Capacidad probada para aprender óperas enteras mientras duermo la siesta.
  Busco posición estable donde pueda ensayar sin que me pidan que toque 
  conciertos al mismo tiempo. Disponibilidad inmediata para viajar (tengo 
  20 baúles listos).
# ==================================================
# SOBRE MÍ
# ==================================================
sobre_mi: |
  Nací en Caracas cuando este país todavía tenía esperanza (y ópera).
  Mi padre me enseñó a tocar el piano antes que a caminar, y desde entonces
  no he parado. A los 8 años, ya era más famosa que el Presidente (y con 
  mejor crítica). He vivido en Nueva York, París, Berlín y cualquier ciudad 
  con un buen piano de cola.
  Soy de las que piensa que "ensayo" es una palabra de cuatro letras, pero 
  reconozco que hasta Liszt necesitaba calentar los dedos. Busco en el Teatro
  Principal un lugar donde pueda gritarle a los tenores "¡estás desafinando!" 
  sin que me echen del teatro.
  Idiomas: hablo piano con fluidez, y además:
  - Español (con acento caraqueño auténtico)
  - Inglés (con acento de Nueva York, época 1860)
  - Francés (convincente, especialmente para quejas)
  - Alemán (suficiente para entender cuando me critican)
