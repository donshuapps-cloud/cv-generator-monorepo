# NOTA HISTÓRICA
# ==================================================
nota_historica: |
  Este CV es una obra de ficción humorística basada en la vida real de 
  María Teresa Carreño (1853-1917), pianista, compositora y cantante venezolana,
  una de las más grandes virtuosas de la historia de la música.
  DATOS HISTÓRICOS REALES UTILIZADOS:
  - Nació en Caracas el 22 de diciembre de 1853
  - Debutó en Nueva York en 1862, a los 8 años, en el Irving Hall
  - Tocó para Abraham Lincoln en la Casa Blanca en 1863
  - Fue alumna de Louis Moreau Gottschalk
  - Estudió con Anton Rubinstein en San Petersburgo
  - Conoció a Gioachino Rossini en París
  - Fue contemporánea y admiradora de Franz Liszt
  - Compuso más de 40 obras para piano, cuartetos de cuerda y canciones
  - Realizó giras por América, Europa, Sudáfrica y Australia
  - Grabó con Thomas Edison en sus primeros fonógrafos
  - Regresó a Venezuela en varias ocasiones, tocando para presidentes y públicos entusiastas
  Las anécdotas y comentarios son imaginados con cariño y respeto a su legado.
  Si Teresa viviera hoy, probablemente tendría su propio canal de YouTube,
  5 millones de suscriptores y seguiría tocando más fuerte que cualquier
  pianista masculino. Y sí, se merecería este puesto en el Teatro Principal.
