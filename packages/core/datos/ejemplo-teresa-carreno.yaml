- "Composiciones propias: Cuarteto de cuerdas en Si menor, varias obras para piano, una ópera inacabada"
- "Grabaciones históricas: Rollos para pianola y cilindros de Edison (se me ve la cara de felicidad)"
# ==================================================
# CARTA DE PRESENTACIÓN (formato libre)
# ==================================================
carta_presentacion: |
  Al honorable jurado del Teatro Principal de Caracas:
  Me dirijo a ustedes con la esperanza de obtener la plaza de "pianista de ensayos"
  de ese glorioso coliseo. Aunque llevo 20 años sin pisar Caracas (la fama internacional
  es así de absorbente), mi corazón sigue latiendo al ritmo de un joropo.
  Sé que pensarán: "¿Teresa Carreño pidiendo trabajo? ¡Pero si es famosa!" Pues sí,
  pero resulta que la fama no paga las cuentas, y entre gira y gira, uno extraña
  el café con leche de la abuela y los tequeños de las fiestas patrias.
  Además, necesito un lugar donde pueda ensayar sin que me pidan que toque un concierto
  al día siguiente. Quiero llegar, sentarme al piano, gritarle a los tenores "¡más
  piano, caramba!" y volver a mi casa sin que me firmen autógrafos. ¿Es mucho pedir?
  Mis habilidades como repetidora son legendarias: puedo tocar cualquier ópera de 
  memoria mientras corrijo la pronunciación italiana del tenor, todo sin perder 
  el compás. Si el bajo se duerme, le lanzo un acorde en fortissimo que lo despierta
  hasta en la butaca de la última fila.
  Acepto ensayar por las mañanas (cuando los cantantes están de mejor humor), 
  tardes (cuando ya se rindieron) o noches (cuando ensayan con desesperación pre-estreno).
  Solo pido un piano en condiciones, un termo de café y que no me pregunten 
  "¿y para cuándo el concierto?".
  Adjunto referencias de gente importante que ya no puede hablar (Lincoln, Gottschalk)
  y de otros que aún viven pero me tienen miedo (Liszt). Todos coinciden: soy la mejor.
  Atentamente,
  Teresa Carreño
  (La que toca más fuerte que Liszt)
  P.D.: Si me aceptan, prometo no quejarme del repertorio. Bueno, no mucho.
  P.D.2: ¿El teatro tiene piano de cola? Pregunto por preguntar.
  P.D.3: Tráiganme cachitos los días de ensayo, por favor.
