name: Build and Release
on:
  push:
    tags:
      - 'v*'  # Dispara cuando se etiqueta con v1.0.0, v2.1.3, etc.
jobs:
  build:
    name: Build packages for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: cv-generator-linux
            asset_name: cv-generator-linux-amd64.tar.gz
          - os: macos-latest
            artifact_name: cv-generator-macos
            asset_name: cv-generator-macos-amd64.tar.gz
          - os: windows-latest
            artifact_name: cv-generator-windows
            asset_name: cv-generator-windows-amd64.zip
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
      - name: Build package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist/${{ matrix.artifact_name }}
          cp -r packages/core dist/${{ matrix.artifact_name }}/
          cp -r packages/cli dist/${{ matrix.artifact_name }}/
          cp scripts/install.sh dist/${{ matrix.artifact_name }}/
          cp README.md dist/${{ matrix.artifact_name }}/
          cd dist
          tar -czf ${{ matrix.asset_name }} ${{ matrix.artifact_name }}/
      - name: Build package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist\cv-generator-windows
          xcopy packages\core dist\cv-generator-windows\core\ /E
          xcopy packages\cli dist\cv-generator-windows\cli\ /E
          xcopy scripts\install.bat dist\cv-generator-windows\ /E
          copy README.md dist\cv-generator-windows\
          cd dist
          Compress-Archive -Path cv-generator-windows -DestinationPath ${{ matrix.asset_name }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: ./artifacts
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body_path: docs/CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
